services:
  # ── Django Web App ─────────────────────────────────────────────────────
  - type: web
    name: autoreview-django
    runtime: python
    rootDir: server
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "import nltk; nltk.download('vader_lexicon')" &&
      cd frontend && npm install && npm run build && cd .. &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate
    startCommand: gunicorn djangoproj.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: backend_url
        value: https://autoreview-node.onrender.com
      - key: sentiment_analyzer_url
        value: https://autoreview-sentiment.onrender.com/

  # ── Node.js + MongoDB API ──────────────────────────────────────────────
  - type: web
    name: autoreview-node
    runtime: node
    rootDir: server/database
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: MONGO_URL
        sync: false

  # ── Flask Sentiment Microservice ───────────────────────────────────────
  - type: web
    name: autoreview-sentiment
    runtime: python
    rootDir: server/djangoapp/microservices
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "import nltk; nltk.download('vader_lexicon')"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
